    /* STYLE UNTUK BUNGKUSAN SHOWCASE (TAMPILAN LUAR) */

        background-color: #f0f2f5;
        font-family: 'Plus Jakarta Sans', sans-serif;
        margin: 0;
        padding: 60px 20px;
        display: flex;
        flex-direction: column;
        align-items: center;

        text-align: center;
        margin-bottom: 60px;
    }
    .showcase-header h1 {
        font-size: 42px;
        color: #111827;
        margin: 0 0 10px 0;
        font-weight: 800;
    }
    .showcase-header p {
        color: #6b7280;
        margin: 0;
        font-size: 18px;
    }
    
    /* GRID UNTUK MENGATUR 12 HP BERJEJER */
    .grid {
        display: flex;
        flex-wrap: wrap;
        gap: 60px 40px;
        justify-content: center;
        max-width: 1400px;
    }

    /* WADAH HP & LABEL KEPALA */
    .mockup-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
        width: 375px; 
    }

    /* LABEL PUTIH DI ATAS HP */
    .mockup-label {
        background: #ffffff;
        border-radius: 99px;
        padding: 18px 24px;
        text-align: center;
        width: 100%;
        box-shadow: 0 4px 14px rgba(0,0,0,0.03);
        border: 1px solid rgba(0,0,0,0.05);
    }
    .mockup-label h3 {
        margin: 0;
        font-size: 11px;
        color: #6b7280;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        font-weight: 700;
    }
    .mockup-label p {
        margin: 6px 0 0 0;
        font-size: 15px;
        color: #00b4d8;
        font-weight: 800;
    }

    /* FRAME HP (BEZEL GELAP) */
    .phone-frame {
        width: 375px;
        height: 812px;
        background: #111827;
        border-radius: 44px;
        padding: 14px;
        box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15);
        position: relative;
    }

    /* NOTCH/PONI HP */
    .phone-notch {
        position: absolute;
        top: 14px;
        left: 50%;
        transform: translateX(-50%);
        width: 150px;
        height: 30px;
        background: #111827;
        border-bottom-left-radius: 20px;
        border-bottom-right-radius: 20px;
        z-index: 10;
    }

    /* LAYAR HP TEMPAT IFRAME JALAN */
    .phone-screen {
        width: 100%;
        height: 100%;
        /* PERBAIKAN: Ubah background putih menjadi warna background aplikasi asli agar garis putih hilang */
        background: #0b0d18; 
        border-radius: 32px;
        overflow: hidden;
        position: relative;
    }
    
    iframe {
        width: 100%;
        height: 100%;
        border: none;
        background: transparent;
    }
</style>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Nalarku.ai — Belajar Lebih Cerdas</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0b0d18;
  --bg2: #10121f;
  --bg3: #141728;
  --card: #181b2e;
  --card2: #1d2035;
  --orange: #f97316;
  --orange2: #ea580c;
  --orange-dim: rgba(249,115,22,0.12);
  --orange-glow: rgba(249,115,22,0.25);
  --green: #22c55e;
  --green-dim: rgba(34,197,94,0.12);
  --blue: #3b82f6;
  --blue-dim: rgba(59,130,246,0.12);
  --purple: #a855f7;
  --purple-dim: rgba(168,85,247,0.12);
  --red: #ef4444;
  --red-dim: rgba(239,68,68,0.1);
  --yellow: #eab308;
  --t1: #f0f4f8;
  --t2: #8892a4;
  --t3: #4a5568;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --r1: 8px; --r2: 14px; --r3: 20px; --r4: 999px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{
  font-family:'Plus Jakarta Sans',sans-serif;
  background:var(--bg);color:var(--t1);
  min-height:100vh;overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}
button,input,textarea,select{font-family:'Plus Jakarta Sans',sans-serif;}

/* ── ICONS (inline SVG system) ── */
.ico{display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;}
.ico svg{display:block;}

/* ── SCREENS ── */
.page{display:none;min-height:100vh;}
.page.show{display:flex;flex-direction:column;}

/* ═══════════════════════════════
   LOGIN PAGE
═══════════════════════════════ */
#pg-login{
  background:var(--bg);
  align-items:center;justify-content:center;
  padding:24px 20px;
}
.login-box{width:100%;max-width:400px;}
.login-brand{
  display:flex;align-items:center;gap:12px;
  margin-bottom:36px;justify-content:center;
}
.login-brand-icon{
  width:46px;height:46px;border-radius:14px;
  background:linear-gradient(135deg,var(--orange),var(--orange2));
  display:flex;align-items:center;justify-content:center;
}
.login-brand-name{font-size:22px;font-weight:800;color:var(--t1);}
.login-brand-name span{color:var(--orange);}
.login-hero{text-align:center;margin-bottom:32px;}
.login-hero h1{font-size:26px;font-weight:800;line-height:1.2;margin-bottom:8px;}
.login-hero p{font-size:14px;color:var(--t2);line-height:1.6;}
.login-tabs{
  display:flex;background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--r2);padding:4px;gap:4px;margin-bottom:24px;
}
.login-tab{
  flex:1;padding:10px;border-radius:10px;border:none;
  background:transparent;color:var(--t2);font-size:13px;font-weight:600;
  cursor:pointer;transition:all .2s;
}
.login-tab.active{background:var(--card);color:var(--t1);box-shadow:0 1px 4px rgba(0,0,0,.4);}
.field{margin-bottom:16px;}
.field label{display:block;font-size:12px;font-weight:600;color:var(--t2);margin-bottom:6px;letter-spacing:.3px;}
.field-wrap{position:relative;}
.field-icon{
  position:absolute;left:14px;top:50%;transform:translateY(-50%);
  color:var(--t3);pointer-events:none;
}
.field input{
  width:100%;background:var(--bg2);border:1px solid var(--border2);
  border-radius:var(--r1);padding:12px 14px 12px 44px;
  color:var(--t1);font-size:14px;outline:none;
  transition:border-color .2s,box-shadow .2s;
}
.field input:focus{border-color:var(--orange);box-shadow:0 0 0 3px var(--orange-dim);}
.field input::placeholder{color:var(--t3);}
.field-eye{
  position:absolute;right:14px;top:50%;transform:translateY(-50%);
  cursor:pointer;color:var(--t3);transition:color .2s;background:none;border:none;padding:0;
}
.field-eye:hover{color:var(--t2);}
.login-forgot{text-align:right;margin-bottom:20px;}
.login-forgot a{font-size:12px;color:var(--orange);text-decoration:none;font-weight:600;}
.btn-login{
  width:100%;padding:14px;border-radius:var(--r2);
  background:linear-gradient(135deg,var(--orange),var(--orange2));
  border:none;color:#fff;font-size:15px;font-weight:700;
  cursor:pointer;transition:transform .15s,opacity .15s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-login:hover{opacity:.9;transform:translateY(-1px);}
.login-divider{
  display:flex;align-items:center;gap:12px;
  margin:20px 0;color:var(--t3);font-size:12px;
}
.login-divider::before,.login-divider::after{
  content:'';flex:1;height:1px;background:var(--border);
}
.btn-google{
  width:100%;padding:12px;border-radius:var(--r2);
  background:var(--bg2);border:1px solid var(--border2);
  color:var(--t1);font-size:14px;font-weight:600;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:10px;
  transition:all .2s;
}
.btn-google:hover{background:var(--card);border-color:var(--border2);}
.login-footer{text-align:center;margin-top:24px;font-size:13px;color:var(--t2);}
.login-footer a{color:var(--orange);font-weight:700;text-decoration:none;}
.feature-pills{
  display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:32px;
}
.f-pill{
  display:flex;align-items:center;gap:6px;
  padding:6px 12px;border-radius:var(--r4);
  background:var(--bg2);border:1px solid var(--border);
  font-size:11px;font-weight:600;color:var(--t2);
}
.f-pill svg{color:var(--orange);}

/* ═══════════════════════════════
   APP SHELL
═══════════════════════════════ */
#pg-app{background:var(--bg);}

/* TOPBAR */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:200;
  background:rgba(11,13,24,.92);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
  padding:13px 18px;
  display:flex;align-items:center;justify-content:space-between;
  max-width:680px;margin:0 auto;
}
/* fix topbar to full width */
.topbar{left:0;right:0;max-width:100%;}
.topbar-brand{display:flex;align-items:center;gap:10px;}
.topbar-brand-icon{
  width:34px;height:34px;border-radius:10px;
  background:linear-gradient(135deg,var(--orange),var(--orange2));
  display:flex;align-items:center;justify-content:center;
}
.topbar-brand-name{font-size:16px;font-weight:800;}
.topbar-brand-name span{color:var(--orange);}
.topbar-right{display:flex;align-items:center;gap:10px;}
.topbar-btn{
  width:34px;height:34px;border-radius:10px;
  background:var(--card);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--t2);transition:all .2s;
}
.topbar-btn:hover{background:var(--card2);color:var(--t1);}
.btn-upgrade{
  background:linear-gradient(135deg,var(--orange),var(--orange2));
  color:#fff;border:none;border-radius:8px;
  padding:7px 14px;font-size:12px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;gap:5px;
  transition:opacity .2s;
}
.btn-upgrade:hover{opacity:.88;}
.user-ava{
  width:34px;height:34px;border-radius:50%;
  background:linear-gradient(135deg,#a855f7,#6366f1);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;cursor:pointer;
  border:2px solid transparent;transition:border-color .2s;
}
.user-ava:hover{border-color:var(--orange);}

/* CONTENT */
.app-content{
  padding:72px 16px 100px;
  max-width:600px;margin:0 auto;
}

/* BOTTOM NAV */
.bnav{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:rgba(11,13,24,.95);backdrop-filter:blur(14px);
  border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-around;
  padding:8px 0 20px;
}
.bnav-item{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  cursor:pointer;color:var(--t3);transition:color .2s;
  padding:4px 12px;min-width:60px;
}
.bnav-item.on{color:var(--orange);}
.bnav-label{font-size:10px;font-weight:600;}

/* ── SCREENS (within app) ── */
.ascreen{display:none;}
.ascreen.on{display:block;}

/* ═══════════════════════════════
   BERANDA
═══════════════════════════════ */
.greeting{
  text-align:center;padding:24px 0 16px;
}
.greeting-wave{
  width:52px;height:52px;border-radius:16px;
  background:var(--orange-dim);border:1px solid var(--orange-glow);
  display:flex;align-items:center;justify-content:center;margin:0 auto 12px;
}
.greeting-name{font-size:22px;font-weight:800;}
.greeting-date{font-size:12px;color:var(--t2);margin-top:4px;}

/* NALA AI BANNER */
.zae-banner{
  background:linear-gradient(135deg,rgba(249,115,22,.1),rgba(234,88,12,.05));
  border:1px solid rgba(249,115,22,.28);
  border-radius:var(--r3);padding:16px;margin:14px 0;
  display:flex;align-items:center;gap:14px;
  cursor:pointer;transition:border-color .2s;
  text-decoration:none;
}
.zae-banner:hover{border-color:rgba(249,115,22,.5);}
.zae-ico{
  width:44px;height:44px;border-radius:13px;flex-shrink:0;
  background:rgba(249,115,22,.18);
  display:flex;align-items:center;justify-content:center;color:var(--orange);
}
.zae-label{font-size:10px;font-weight:700;color:var(--orange);text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px;}
.zae-msg{font-size:13px;color:var(--t1);font-weight:500;line-height:1.45;}
.zae-dot{
  width:8px;height:8px;border-radius:50%;background:var(--green);
  flex-shrink:0;margin-left:auto;
  animation:pulse-dot 2s ease infinite;
}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}

/* STAT CARDS */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin:14px 0;}
.scard{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r2);padding:15px;
  cursor:pointer;transition:all .2s;position:relative;overflow:hidden;
}
.scard:hover{border-color:var(--border2);transform:translateY(-2px);}
.scard-ico{
  width:34px;height:34px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;margin-bottom:10px;
}
.scard-ico.o{background:var(--orange-dim);color:var(--orange);}
.scard-ico.g{background:var(--green-dim);color:var(--green);}
.scard-ico.p{background:var(--purple-dim);color:var(--purple);}
.scard-ico.b{background:var(--blue-dim);color:var(--blue);}
.scard-label{font-size:10px;color:var(--t2);font-weight:600;margin-bottom:3px;text-transform:uppercase;letter-spacing:.4px;}
.scard-val{font-size:26px;font-weight:800;color:var(--t1);}
.scard-val.o{color:var(--orange);}
.scard-val.g{color:var(--green);}
.scard-sub{font-size:11px;color:var(--t3);margin-top:2px;}
.xp-bar{height:3px;background:rgba(255,255,255,.07);border-radius:99px;margin-top:8px;overflow:hidden;}
.xp-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--orange),#fbbf24);transition:width .8s ease;}

/* QUICK CREATE */
.qcreate{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r2);padding:14px 16px;margin:14px 0;
}
.qlabel{font-size:11px;color:var(--t2);font-weight:600;margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px;}
.qbtns{display:flex;flex-wrap:wrap;gap:8px;}
.qbtn{
  display:flex;align-items:center;gap:7px;
  padding:8px 13px;border-radius:8px;
  border:1px solid var(--border);background:transparent;
  color:var(--t2);font-size:12px;font-weight:600;
  cursor:pointer;transition:all .2s;
}
.qbtn svg{color:var(--orange);}
.qbtn:hover{background:var(--card2);border-color:var(--border2);color:var(--t1);}

/* SECTION TITLE */
.stitle{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:12px;
}
.stitle h2{font-size:15px;font-weight:700;}
.stitle a{font-size:12px;color:var(--orange);font-weight:600;text-decoration:none;cursor:pointer;}

/* CATATAN CARDS */
.note-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r2);padding:15px 16px;margin-bottom:10px;
  cursor:pointer;transition:all .2s;
}
.note-card:hover{border-color:var(--border2);background:var(--card2);}
.note-header{display:flex;align-items:flex-start;gap:12px;}
.note-ico{
  width:38px;height:38px;border-radius:11px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.note-name{font-size:14px;font-weight:700;color:var(--t1);margin-bottom:3px;}
.note-sub{font-size:11px;color:var(--t2);}
.note-preview{font-size:12px;color:var(--t3);margin-top:8px;line-height:1.5;}
.note-footer{display:flex;align-items:center;gap:8px;margin-top:10px;}
.note-source{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--t3);}
.note-time{font-size:11px;color:var(--t3);margin-left:auto;}

/* AI ANALYSIS */
.ai-analysis{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r3);padding:18px;margin:14px 0;
}
.ai-analysis-hdr{display:flex;align-items:center;gap:11px;margin-bottom:14px;}
.ai-analysis-ico{
  width:38px;height:38px;border-radius:11px;
  background:var(--orange-dim);display:flex;align-items:center;justify-content:center;color:var(--orange);
}
.ai-analysis-title{font-size:14px;font-weight:700;}
.ai-analysis-sub{font-size:11px;color:var(--t2);}
.ai-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:9px 0;border-bottom:1px solid var(--border);
}
.ai-row:last-child{border-bottom:none;}
.ai-row-label{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--t2);}
.ai-row-label svg{color:var(--orange);}
.ai-row-val{font-size:13px;font-weight:700;}
.ai-row-val.g{color:var(--green);}
.ai-row-val.o{color:var(--orange);}
.ai-row-val.b{color:var(--blue);}
.ai-row-val.r{color:var(--red);}

/* STUDY TIMER WIDGET */
.timer-widget{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r3);padding:20px;margin:14px 0;
  text-align:center;
}
.timer-title{font-size:13px;color:var(--t2);font-weight:600;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px;}
.timer-display{
  font-size:52px;font-weight:800;letter-spacing:-2px;
  color:var(--t1);margin:8px 0;font-variant-numeric:tabular-nums;
}
.timer-mode-tabs{display:flex;gap:6px;justify-content:center;margin-bottom:16px;}
.timer-tab{
  padding:5px 14px;border-radius:var(--r4);border:1px solid var(--border);
  background:transparent;color:var(--t3);font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;
}
.timer-tab.on{background:var(--orange-dim);border-color:rgba(249,115,22,.4);color:var(--orange);}
.timer-btns{display:flex;gap:10px;justify-content:center;margin-top:14px;}
.timer-btn{
  width:44px;height:44px;border-radius:50%;border:1px solid var(--border);
  background:var(--card2);cursor:pointer;color:var(--t2);
  display:flex;align-items:center;justify-content:center;transition:all .2s;
}
.timer-btn.main{
  width:56px;height:56px;
  background:linear-gradient(135deg,var(--orange),var(--orange2));
  border:none;color:#fff;
}
.timer-btn:hover{background:var(--card2);color:var(--t1);}
.timer-sessions{font-size:11px;color:var(--t3);margin-top:12px;}

/* STREAK CALENDAR */
.streak-cal{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r2);padding:16px;margin:14px 0;
}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.cal-month{font-size:14px;font-weight:700;}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;text-align:center;}
.cal-day-label{font-size:10px;color:var(--t3);font-weight:700;padding:2px 0;}
.cal-day{
  width:100%;aspect-ratio:1;border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:600;
}
.cal-day.active{background:var(--orange);color:#fff;}
.cal-day.dim{background:var(--orange-dim);color:var(--orange);}
.cal-day.today{border:1.5px solid var(--orange);color:var(--orange);}
.cal-day.empty{background:var(--bg2);color:var(--t3);}

/* ═══════════════════════════════
   NALA AI CHAT
═══════════════════════════════ */
.chat-wrap{
  display:flex;flex-direction:column;
  height:calc(100dvh - 72px - 80px);
}
.chat-hdr{
  padding:14px 0 10px;
  display:flex;align-items:center;justify-content:space-between;
}
.chat-hdr-left{display:flex;align-items:center;gap:10px;}
.chat-avatar{
  width:40px;height:40px;border-radius:12px;
  background:linear-gradient(135deg,var(--orange),var(--orange2));
  display:flex;align-items:center;justify-content:center;color:#fff;
  position:relative;
}
.chat-avatar::after{
  content:'';position:absolute;bottom:-2px;right:-2px;
  width:10px;height:10px;border-radius:50%;
  background:var(--green);border:2px solid var(--bg);
}
.chat-name{font-size:15px;font-weight:700;}
.chat-status{font-size:11px;color:var(--green);font-weight:600;}
.chat-hdr-btns{display:flex;gap:8px;}
.chat-hdr-btn{
  width:34px;height:34px;border-radius:10px;
  background:var(--card);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;color:var(--t2);cursor:pointer;
}
.chat-msgs{
  flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;
  padding:2px 0 10px;
  scrollbar-width:thin;scrollbar-color:var(--border) transparent;
}
.cmsg{display:flex;gap:9px;align-items:flex-end;}
.cmsg.u{flex-direction:row-reverse;}
.cmsg-ava{
  width:30px;height:30px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;
}
.cmsg-ava.ai{background:linear-gradient(135deg,var(--orange),var(--orange2));color:#fff;}
.cmsg-ava.u{background:linear-gradient(135deg,#a855f7,#6366f1);}
.cmsg-body{}
.cmsg-bubble{
  max-width:75%;padding:10px 13px;border-radius:14px;
  font-size:13px;line-height:1.6;
}
.cmsg.ai .cmsg-bubble{background:var(--card);border:1px solid var(--border);color:var(--t1);border-bottom-left-radius:4px;}
.cmsg.u .cmsg-bubble{background:linear-gradient(135deg,var(--orange),var(--orange2));color:#fff;border-bottom-right-radius:4px;}
.cmsg-time{font-size:10px;color:var(--t3);margin-top:3px;}
.cmsg.u .cmsg-time{text-align:right;}
.typing{display:flex;gap:4px;align-items:center;padding:3px 0;}
.td{width:6px;height:6px;border-radius:50%;background:var(--orange);animation:tdot .8s ease infinite;}
.td:nth-child(2){animation-delay:.15s;}.td:nth-child(3){animation-delay:.3s;}
@keyframes tdot{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.chat-bottom{}
.chat-suggestions{display:flex;gap:7px;padding:8px 0;overflow-x:auto;scrollbar-width:none;}
.chat-suggestions::-webkit-scrollbar{display:none;}
.sug-btn{
  white-space:nowrap;padding:7px 13px;border-radius:var(--r4);
  border:1px solid var(--border);background:var(--card);
  color:var(--t2);font-size:12px;font-weight:600;cursor:pointer;
  transition:all .2s;flex-shrink:0;
}
.sug-btn:hover{border-color:var(--orange);color:var(--orange);background:var(--orange-dim);}
.chat-input-row{
  display:flex;align-items:flex-end;gap:9px;
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r2);padding:10px 12px;
  transition:border-color .2s;
}
.chat-input-row:focus-within{border-color:rgba(249,115,22,.4);}
.chat-ta{
  flex:1;background:transparent;border:none;outline:none;
  color:var(--t1);font-size:14px;resize:none;
  max-height:96px;min-height:20px;line-height:1.5;
}
.chat-ta::placeholder{color:var(--t3);}
.chat-send{
  width:36px;height:36px;border-radius:10px;
  background:linear-gradient(135deg,var(--orange),var(--orange2));
  border:none;cursor:pointer;color:#fff;
  display:flex;align-items:center;justify-content:center;
  transition:transform .15s;flex-shrink:0;
}
.chat-send:hover{transform:scale(1.06);}

/* ═══════════════════════════════
   UJIAN
═══════════════════════════════ */
.quiz-top{padding:14px 0 10px;}
.quiz-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.quiz-pbar{height:4px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden;}
.quiz-pfill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--orange),#fbbf24);transition:width .4s;}
.qcard{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r3);padding:20px 18px;margin:12px 0;
}
.qnum{font-size:10px;font-weight:700;color:var(--orange);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;}
.qtxt{font-size:15px;font-weight:600;line-height:1.6;color:var(--t1);}
.qopts{display:flex;flex-direction:column;gap:9px;margin-top:18px;}
.qopt{
  padding:12px 15px;border-radius:var(--r1);
  border:1px solid var(--border);background:transparent;
  color:var(--t1);font-size:13px;font-weight:500;
  cursor:pointer;text-align:left;transition:all .2s;
  display:flex;align-items:center;gap:11px;
}
.qopt:hover{border-color:var(--orange);background:var(--orange-dim);}
.qopt.correct{border-color:var(--green);background:var(--green-dim);color:var(--green);}
.qopt.wrong{border-color:var(--red);background:var(--red-dim);color:var(--red);}
.qopt-letter{
  width:24px;height:24px;border-radius:6px;flex-shrink:0;
  background:var(--bg2);display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:var(--t3);transition:all .2s;
}
.qopt.correct .qopt-letter{background:var(--green);color:#fff;}
.qopt.wrong .qopt-letter{background:var(--red);color:#fff;}
.qexp{
  background:var(--blue-dim);border:1px solid rgba(59,130,246,.25);
  border-radius:var(--r1);padding:12px 14px;margin-top:12px;
  font-size:13px;color:#93c5fd;line-height:1.6;display:none;
}
.quiz-footer{display:flex;gap:10px;margin-top:12px;}
.btn-pri{
  flex:1;padding:13px;border-radius:var(--r2);
  background:linear-gradient(135deg,var(--orange),var(--orange2));
  border:none;color:#fff;font-size:14px;font-weight:700;
  cursor:pointer;transition:transform .15s;display:flex;align-items:center;justify-content:center;gap:7px;
}
.btn-pri:hover{transform:scale(1.02);}
.btn-sec{
  padding:13px 16px;border-radius:var(--r2);
  background:transparent;border:1px solid var(--border);
  color:var(--t2);font-size:13px;font-weight:600;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.zae-tip{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r2);padding:15px;margin:12px 0;
}
.zae-tip-hdr{display:flex;align-items:center;gap:9px;margin-bottom:10px;}
.zae-tip-ico{width:34px;height:34px;border-radius:10px;background:var(--orange-dim);display:flex;align-items:center;justify-content:center;color:var(--orange);}
.zae-tip-txt{font-size:13px;color:var(--t2);line-height:1.6;}

/* ═══════════════════════════════
   PERINGKAT
═══════════════════════════════ */
.lb-item{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r2);padding:13px 15px;
  display:flex;align-items:center;gap:11px;margin-bottom:9px;
  cursor:pointer;transition:all .2s;
}
.lb-item:hover{border-color:var(--border2);}
.lb-item.me{border-color:rgba(249,115,22,.35);background:rgba(249,115,22,.04);}
.lb-rank{font-size:17px;font-weight:800;min-width:26px;text-align:center;}
.lb-rank.gold{color:var(--yellow);}
.lb-rank.silver{color:#94a3b8;}
.lb-rank.bronze{color:#cd7c37;}
.lb-ava{
  width:38px;height:38px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;
}
.lb-info{flex:1;}
.lb-name{font-size:13px;font-weight:700;}
.lb-xp-txt{font-size:11px;color:var(--t2);}
.lb-score{font-size:14px;font-weight:800;color:var(--orange);}

/* ═══════════════════════════════
   PROFIL
═══════════════════════════════ */
.prof-hdr{text-align:center;padding:18px 0 12px;}
.prof-ava{
  width:80px;height:80px;border-radius:50%;margin:0 auto 12px;
  background:linear-gradient(135deg,#a855f7,#6366f1);
  display:flex;align-items:center;justify-content:center;
  font-size:28px;font-weight:800;
  border:3px solid var(--orange);
}
.prof-name{font-size:20px;font-weight:800;}
.prof-email{font-size:12px;color:var(--t2);margin-top:3px;}
.prof-badge{
  display:inline-block;margin-top:8px;
  background:var(--orange-dim);border:1px solid var(--orange-glow);
  color:var(--orange);font-size:11px;font-weight:700;
  padding:4px 14px;border-radius:var(--r4);
}
.prof-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:14px 0;}
.prof-scard{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r2);padding:13px;text-align:center;
}
.prof-sval{font-size:22px;font-weight:800;color:var(--orange);}
.prof-slbl{font-size:10px;color:var(--t2);margin-top:2px;font-weight:600;}
.prof-item{
  display:flex;align-items:center;gap:12px;
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r2);padding:13px 15px;margin-bottom:8px;
  cursor:pointer;transition:all .2s;
}
.prof-item:hover{border-color:var(--border2);}
.prof-item-ico{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;}
.prof-item-txt{flex:1;}
.prof-item-name{font-size:13px;font-weight:700;}
.prof-item-sub{font-size:11px;color:var(--t2);}
.prof-item-arr{color:var(--t3);}

/* ── CHIPS ── */
.chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700;}
.chip-o{background:var(--orange-dim);color:var(--orange);}
.chip-g{background:var(--green-dim);color:var(--green);}
.chip-b{background:var(--blue-dim);color:var(--blue);}
.chip-p{background:var(--purple-dim);color:var(--purple);}

/* TOPIC CARD */
.tcard{
  background:var(--card);border:1px solid var(--border);border-radius:var(--r2);
  padding:14px 15px;display:flex;align-items:center;gap:12px;
  margin-bottom:9px;cursor:pointer;transition:all .2s;
}
.tcard:hover{border-color:var(--border2);background:var(--card2);transform:translateX(3px);}
.tcard-ico{width:44px;height:44px;border-radius:13px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.tcard-info{flex:1;}
.tcard-name{font-size:14px;font-weight:700;}
.tcard-sub{font-size:11px;color:var(--t2);margin-top:2px;}
.tbadge{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700;flex-shrink:0;}
.tbadge-new{background:var(--orange-dim);color:var(--orange);}
.tbadge-done{background:var(--green-dim);color:var(--green);}
.tbadge-prog{background:var(--blue-dim);color:var(--blue);}

/* TOAST */
.toast{
  position:fixed;top:80px;left:50%;transform:translateX(-50%);
  background:var(--green);color:#fff;padding:10px 18px;border-radius:10px;
  font-size:13px;font-weight:600;z-index:9999;
  animation:tin .25s ease,tout .25s ease 2.3s forwards;
  white-space:nowrap;max-width:90vw;text-align:center;
  display:flex;align-items:center;gap:8px;
}
.toast.err{background:var(--red);}
@keyframes tin{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes tout{from{opacity:1}to{opacity:0;visibility:hidden}}

/* SPLASH */
#splash{
  position:fixed;inset:0;z-index:9999;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
}
.splash-ico{
  width:70px;height:70px;border-radius:22px;
  background:linear-gradient(135deg,var(--orange),var(--orange2));
  display:flex;align-items:center;justify-content:center;color:#fff;
  animation:scl 1.4s ease-in-out infinite;
}
@keyframes scl{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
.splash-name{font-size:26px;font-weight:800;}
.splash-name span{color:var(--orange);}
.splash-tagline{font-size:12px;color:var(--t2);}
.splash-bar{width:160px;height:3px;background:rgba(255,255,255,.1);border-radius:99px;margin-top:8px;overflow:hidden;}
.splash-fill{height:100%;background:var(--orange);border-radius:99px;animation:sfill 2.2s ease forwards;}
@keyframes sfill{from{width:0}to{width:100%}}

/* ═══════════════════════════════
   ONBOARDING FLOW
═══════════════════════════════ */
#pg-onboard{
  background:var(--bg);
  align-items:center;justify-content:center;
  padding:24px 20px;min-height:100vh;
}
.ob-box{width:100%;max-width:400px;}
.ob-progress{
  display:flex;align-items:center;gap:8px;margin-bottom:28px;
}
.ob-step{
  flex:1;height:3px;border-radius:99px;
  background:var(--border);transition:background .3s;
}
.ob-step.done{background:var(--orange);}
.ob-step.active{background:linear-gradient(90deg,var(--orange),#fbbf24);}
.ob-step-num{
  font-size:11px;font-weight:700;color:var(--t3);white-space:nowrap;
}
.ob-header{margin-bottom:24px;}
.ob-tag{
  display:inline-flex;align-items:center;gap:6px;
  padding:5px 12px;border-radius:var(--r4);
  background:var(--orange-dim);border:1px solid var(--orange-glow);
  font-size:11px;font-weight:700;color:var(--orange);
  text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px;
}
.ob-title{font-size:22px;font-weight:800;line-height:1.25;margin-bottom:6px;}
.ob-sub{font-size:13px;color:var(--t2);line-height:1.6;}
.ob-screen{display:none;}
.ob-screen.show{display:block;}
.ob-field{margin-bottom:14px;}
.ob-field label{
  display:block;font-size:12px;font-weight:600;color:var(--t2);
  margin-bottom:6px;letter-spacing:.3px;
}
.ob-field-wrap{position:relative;}
.ob-field-ico{
  position:absolute;left:13px;top:50%;transform:translateY(-50%);
  color:var(--t3);pointer-events:none;
}
.ob-input{
  width:100%;background:var(--bg2);border:1px solid var(--border2);
  border-radius:var(--r1);padding:12px 14px 12px 42px;
  color:var(--t1);font-size:14px;outline:none;
  transition:border-color .2s,box-shadow .2s;
  font-family:'Plus Jakarta Sans',sans-serif;
}
.ob-input:focus{border-color:var(--orange);box-shadow:0 0 0 3px var(--orange-dim);}
.ob-input::placeholder{color:var(--t3);}
.ob-input.no-ico{padding-left:14px;}
.ob-select{
  width:100%;background:var(--bg2);border:1px solid var(--border2);
  border-radius:var(--r1);padding:12px 14px 12px 42px;
  color:var(--t1);font-size:14px;outline:none;
  transition:border-color .2s;
  font-family:'Plus Jakarta Sans',sans-serif;
  appearance:none;cursor:pointer;
}
.ob-select:focus{border-color:var(--orange);box-shadow:0 0 0 3px var(--orange-dim);}
.ob-select option{background:var(--bg2);color:var(--t1);}
.ob-arrow{
  position:absolute;right:13px;top:50%;transform:translateY(-50%);
  pointer-events:none;color:var(--t3);
}
.ob-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px;}
.ob-chip{
  padding:8px 16px;border-radius:var(--r4);border:1px solid var(--border2);
  background:transparent;color:var(--t2);font-size:12px;font-weight:600;
  cursor:pointer;transition:all .2s;
  font-family:'Plus Jakarta Sans',sans-serif;
}
.ob-chip.sel{
  background:var(--orange-dim);border-color:rgba(249,115,22,.5);color:var(--orange);
}
.ob-footer{display:flex;gap:10px;margin-top:24px;}
.ob-btn-back{
  padding:13px 16px;border-radius:var(--r2);
  background:transparent;border:1px solid var(--border2);
  color:var(--t2);font-size:14px;font-weight:600;cursor:pointer;
  display:flex;align-items:center;gap:7px;
  font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;
}
.ob-btn-back:hover{background:var(--card);color:var(--t1);}
.ob-btn-next{
  flex:1;padding:13px;border-radius:var(--r2);
  background:linear-gradient(135deg,var(--orange),var(--orange2));
  border:none;color:#fff;font-size:14px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
  font-family:'Plus Jakarta Sans',sans-serif;transition:opacity .2s;
}
.ob-btn-next:hover{opacity:.9;}
.ob-avatar-row{
  display:flex;gap:10px;flex-wrap:wrap;margin-top:4px;
}
.ob-avatar-opt{
  width:52px;height:52px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:800;cursor:pointer;
  border:2px solid var(--border);transition:all .2s;
}
.ob-avatar-opt.sel{border-color:var(--orange);box-shadow:0 0 0 3px var(--orange-dim);}
.ob-welcome{
  text-align:center;padding:20px 0;
}
.ob-welcome-ava{
  width:90px;height:90px;border-radius:50%;margin:0 auto 16px;
  display:flex;align-items:center;justify-content:center;
  font-size:34px;font-weight:800;
  border:3px solid var(--orange);animation:scl 2s ease-in-out infinite;
}
.ob-welcome h2{font-size:24px;font-weight:800;margin-bottom:8px;}
.ob-welcome p{font-size:14px;color:var(--t2);line-height:1.6;margin-bottom:20px;}
.ob-info-row{
  display:flex;align-items:center;gap:10px;
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r1);padding:11px 14px;margin-bottom:8px;
  font-size:13px;
}
.ob-info-ico{
  width:30px;height:30px;border-radius:8px;flex-shrink:0;
  background:var(--orange-dim);color:var(--orange);
  display:flex;align-items:center;justify-content:center;
}
.ob-info-key{color:var(--t2);font-size:12px;}
.ob-info-val{font-weight:700;color:var(--t1);font-size:13px;}

/* ═══════════════════════════════
   PODIUM LEADERBOARD
═══════════════════════════════ */
.lb-week-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 0 4px;
}
.lb-week-title{font-size:18px;font-weight:800;}
.lb-week-chip{
  display:flex;align-items:center;gap:6px;
  padding:5px 12px;border-radius:var(--r4);
  background:var(--green-dim);border:1px solid rgba(34,197,94,.3);
  color:var(--green);font-size:11px;font-weight:700;
}
.lb-zae-card{
  background:linear-gradient(135deg,rgba(249,115,22,.1),rgba(234,88,12,.05));
  border:1px solid rgba(249,115,22,.28);
  border-radius:var(--r2);padding:14px 16px;margin:12px 0;
  display:flex;align-items:flex-start;gap:12px;
}
.lb-zae-ico{
  width:36px;height:36px;border-radius:10px;flex-shrink:0;
  background:rgba(249,115,22,.18);display:flex;align-items:center;justify-content:center;color:var(--orange);
}
.lb-zae-label{font-size:10px;font-weight:700;color:var(--orange);text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px;display:flex;align-items:center;gap:5px;}
.lb-zae-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse-dot 2s ease infinite;}
.lb-zae-msg{font-size:13px;color:var(--t1);line-height:1.5;}

/* Podium */
.lb-podium{
  display:flex;align-items:flex-end;justify-content:center;
  gap:8px;margin:20px 0 6px;padding:0 4px;
}
.lb-podium-slot{
  display:flex;flex-direction:column;align-items:center;gap:0;
  flex:1;
}
.lb-podium-slot.first{order:2;flex:1.15;}
.lb-podium-slot.second{order:1;}
.lb-podium-slot.third{order:3;}

.lb-pod-ava-wrap{position:relative;margin-bottom:-1px;}
.lb-pod-ava{
  width:60px;height:60px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:800;
  border:2.5px solid rgba(255,255,255,.12);
  position:relative;
}
.lb-podium-slot.first .lb-pod-ava{
  width:70px;height:70px;
  border-color:var(--yellow);
  box-shadow:0 0 0 3px rgba(234,179,8,.2), 0 8px 24px rgba(0,0,0,.4);
}
.lb-podium-slot.second .lb-pod-ava{
  border-color:#94a3b8;
  box-shadow:0 0 0 3px rgba(148,163,184,.15);
}
.lb-podium-slot.third .lb-pod-ava{
  border-color:#cd7c37;
  box-shadow:0 0 0 3px rgba(205,124,55,.15);
}
.lb-pod-crown{
  position:absolute;top:-14px;left:50%;transform:translateX(-50%);
  font-size:16px;line-height:1;
}
.lb-pod-rank{
  position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);
  width:18px;height:18px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:800;border:2px solid var(--bg);
}
.lb-podium-slot.first .lb-pod-rank{background:var(--yellow);color:#000;}
.lb-podium-slot.second .lb-pod-rank{background:#94a3b8;color:#000;}
.lb-podium-slot.third .lb-pod-rank{background:#cd7c37;color:#fff;}
.lb-pod-name{

═══════════════════════════════ */
#pg-plagiarism{

}
.plag-header{
  background:rgba(11,13,24,.92);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
  padding:13px 18px;display:flex;align-items:center;gap:12px;
  position:sticky;top:0;z-index:100;
}
.plag-back{
  width:34px;height:34px;border-radius:10px;background:var(--card);
  border:1px solid var(--border);display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--t2);transition:all .2s;flex-shrink:0;
}
.plag-back:hover{background:var(--card2);color:var(--t1);}
.plag-title{font-size:16px;font-weight:800;}
.plag-sub{font-size:11px;color:var(--t2);}
.plag-content{padding:16px;max-width:600px;margin:0 auto;}
.plag-zae{
  background:linear-gradient(135deg,rgba(249,115,22,.1),rgba(234,88,12,.05));
  border:1px solid rgba(249,115,22,.28);
  border-radius:var(--r2);padding:14px 16px;margin-bottom:16px;
  display:flex;align-items:center;gap:12px;
}
.plag-zae-ico{
  width:38px;height:38px;border-radius:11px;flex-shrink:0;
  background:rgba(249,115,22,.18);display:flex;align-items:center;justify-content:center;color:var(--orange);
}
.plag-input-wrap{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r2);padding:14px;margin-bottom:12px;
}
.plag-input-label{font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;}
.plag-ta{
  width:100%;background:var(--bg2);border:1px solid var(--border2);
  border-radius:var(--r1);padding:13px;
  color:var(--t1);font-size:14px;resize:none;outline:none;
  min-height:140px;line-height:1.6;
  font-family:'Plus Jakarta Sans',sans-serif;transition:border-color .2s;
}
.plag-ta:focus{border-color:var(--orange);}
.plag-ta::placeholder{color:var(--t3);}
.plag-meta{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:8px;
}
.plag-count{font-size:11px;color:var(--t3);}
.plag-clear{
  font-size:11px;color:var(--orange);font-weight:600;cursor:pointer;
  background:none;border:none;font-family:'Plus Jakarta Sans',sans-serif;
}
.plag-options{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r2);padding:14px;margin-bottom:12px;
}
.plag-opt-title{font-size:12px;font-weight:700;color:var(--t2);margin-bottom:10px;}
.plag-check-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 0;border-bottom:1px solid var(--border);
}
.plag-check-row:last-child{border-bottom:none;}
.plag-check-left{display:flex;align-items:center;gap:9px;font-size:13px;}
.plag-check-ico{
  width:28px;height:28px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
}
.toggle{
  width:38px;height:22px;border-radius:99px;
  background:var(--border2);cursor:pointer;position:relative;transition:background .2s;
  flex-shrink:0;border:none;padding:0;
}
.toggle.on{background:var(--orange);}
.toggle::after{
  content:'';position:absolute;top:3px;left:3px;
  width:16px;height:16px;border-radius:50%;background:#fff;
  transition:transform .2s;
}
.toggle.on::after{transform:translateX(16px);}
.plag-btn{
  width:100%;padding:14px;border-radius:var(--r2);
  background:linear-gradient(135deg,var(--orange),var(--orange2));
  border:none;color:#fff;font-size:15px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;
  font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;margin-bottom:16px;
}
.plag-btn:hover{opacity:.9;transform:translateY(-1px);}
.plag-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}

/* RESULT */
.plag-result{display:none;}
.plag-score-ring{
  text-align:center;padding:24px 0;
}
.plag-ring-wrap{position:relative;width:130px;height:130px;margin:0 auto 16px;}
.plag-ring-svg{transform:rotate(-90deg);}
.plag-ring-track{fill:none;stroke:var(--border2);stroke-width:10;}
.plag-ring-fill{
  fill:none;stroke-width:10;stroke-linecap:round;
  transition:stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1);
}
.plag-ring-text{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
}
.plag-pct{font-size:28px;font-weight:800;}
.plag-pct-lbl{font-size:11px;font-weight:600;color:var(--t2);}
.plag-verdict{
  display:inline-block;padding:5px 16px;border-radius:var(--r4);
  font-size:12px;font-weight:700;margin-top:6px;
}
.plag-verdict.low{background:var(--green-dim);color:var(--green);}
.plag-verdict.med{background:rgba(234,179,8,.15);color:var(--yellow);}
.plag-verdict.high{background:var(--red-dim);color:var(--red);}

.plag-breakdown{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r2);padding:15px;margin-bottom:12px;
}
.plag-bd-title{font-size:13px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.plag-bd-row{
  display:flex;align-items:center;gap:10px;margin-bottom:9px;
}
.plag-bd-label{font-size:12px;color:var(--t2);min-width:90px;}
.plag-bd-bar{flex:1;height:6px;background:var(--border2);border-radius:99px;overflow:hidden;}
.plag-bd-fill{height:100%;border-radius:99px;transition:width 1s ease;}
.plag-bd-pct{font-size:12px;font-weight:700;min-width:34px;text-align:right;}

.plag-highlights{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r2);padding:15px;margin-bottom:12px;
}
.plag-hl-title{font-size:13px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.plag-hl-item{
  padding:10px 12px;border-radius:var(--r1);
  border-left:3px solid var(--red);background:var(--red-dim);
  margin-bottom:8px;font-size:12px;color:var(--t2);line-height:1.5;
}
.plag-hl-item strong{color:var(--t1);}
.plag-hl-source{font-size:11px;color:var(--blue);margin-top:4px;font-weight:600;}

.plag-ai-rec{
  background:linear-gradient(135deg,rgba(249,115,22,.1),rgba(234,88,12,.05));
  border:1px solid rgba(249,115,22,.28);
  border-radius:var(--r2);padding:14px;margin-bottom:16px;
}
.plag-ai-rec-label{font-size:10px;font-weight:700;color:var(--orange);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;}
.plag-ai-rec-txt{font-size:13px;color:var(--t1);line-height:1.6;}
.plag-retry{
  width:100%;padding:13px;border-radius:var(--r2);
  background:transparent;border:1px solid var(--border2);
  color:var(--t2);font-size:14px;font-weight:600;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;
  font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s;
}
.plag-retry:hover{background:var(--card);color:var(--t1);}

/* loading overlay */
.plag-loading{
  display:none;
  flex-direction:column;align-items:center;justify-content:center;
  padding:40px 20px;text-align:center;
}
.plag-spinner{
  width:50px;height:50px;border-radius:50%;
  border:3px solid var(--border2);
  border-top-color:var(--orange);
  animation:spin .8s linear infinite;margin-bottom:16px;
}
@keyframes spin{to{transform:rotate(360deg)}}
.plag-load-msg{font-size:14px;color:var(--t2);line-height:1.6;}
.plag-load-steps{margin-top:12px;display:flex;flex-direction:column;gap:6px;width:100%;max-width:280px;}
.plag-load-step{
  display:flex;align-items:center;gap:9px;padding:8px 12px;
  border-radius:var(--r1);background:var(--card);
  font-size:12px;color:var(--t3);transition:all .3s;
}
.plag-load-step.done-s{color:var(--green);}
.plag-load-step.active-s{color:var(--orange);background:var(--orange-dim);}
.plag-step-ico{width:18px;height:18px;flex-shrink:0;}
</style>

let obData = { nickname:'', age:'', gender:'', level:'', school:'', city:'', styles:[], time:'', dur:'', avatar:'M', goal:'', motivation:'' };
let currentObStep = 1;

function obNext(step) {
  if (step === 1) {
    const nickIn = document.getElementById('ob-nickname');
    const nick = nickIn ? nickIn.value.trim() : '';
    if (!nick) { shakeEl('ob-s1'); showToast('Masukkan nama panggilanmu dulu ya!', true); return; }
    obData.nickname = nick;
    const ageIn = document.getElementById('ob-age');
    obData.age = ageIn ? ageIn.value : '';
  }
  if (step === 2) {
    const levIn = document.getElementById('ob-level');
    obData.level = levIn ? levIn.value : '';
    const schIn = document.getElementById('ob-school');
    obData.school = schIn ? schIn.value.trim() : '';
    const citIn = document.getElementById('ob-city');
    obData.city = citIn ? citIn.value.trim() : '';
  }
  if (step === 3) {
    obData.styles = [...document.querySelectorAll('#ob-style-chips .ob-chip.sel')].map(c=>c.textContent.trim());
  }
  currentObStep = step + 1;
  updateObProgress(currentObStep);
  document.querySelectorAll('.ob-screen').forEach(s => s.classList.remove('show'));
  const nextS = document.getElementById('ob-s' + currentObStep);
  if (nextS) nextS.classList.add('show');
}

function obBack(step) {
  currentObStep = step - 1;
  updateObProgress(currentObStep);
  document.querySelectorAll('.ob-screen').forEach(s => s.classList.remove('show'));
  const backS = document.getElementById('ob-s' + currentObStep);
  if (backS) backS.classList.add('show');
}

function updateObProgress(step) {
  const labels = ['','Langkah 1 / 4','Langkah 2 / 4','Langkah 3 / 4','Langkah 4 / 4','Selesai!'];
  const stepNum = document.getElementById('ob-stepnum');
  if (stepNum) stepNum.textContent = labels[step] || '';
  for (let i = 1; i <= 4; i++) {
    const el = document.getElementById('op'+i);
    if (!el) continue;
    el.className = 'ob-step';
    if (i < step) el.classList.add('done');
    else if (i === step) el.classList.add('active');
  }
}

// ── STREAK CALENDAR ──
function buildCal() {
  const dayLabels = ['M','S','S','R','K','J','S'];
  let html = dayLabels.map(d=>`<div class="cal-day-label">${d}</div>`).join('');
  const now = new Date(); const yr = now.getFullYear(); const mo = now.getMonth();
  const firstDay = new Date(yr,mo,1).getDay();
  const offset = (firstDay+6)%7;
  const total = new Date(yr,mo+1,0).getDate();
  for (let i=0;i<offset;i++) html+=`<div></div>`;
  for (let d=1;d<=total;d++) {
    let cls = 'empty';
    if (d < now.getDate() && Math.random()>.6) cls='dim';
    if (d === now.getDate()) cls='today';
    html+=`<div class="cal-day ${cls}">${d}</div>`;
  }
  const calEl = document.getElementById('cal-days');
  if (calEl) calEl.innerHTML = html;
}

// ── TIMER ──
let timerInt=null, timerSecs=25*60, timerRunning=false, timerSessions=0;
const MODES = { focus:25*60, short:5*60, long:15*60 };

function setTimerMode(m, el) {
  const widget = document.getElementById('timer-widget');
  if (widget) widget.querySelectorAll('.timer-tab').forEach(t=>t.classList.remove('on'));
  if (el) el.classList.add('on');
  resetTimer();
  timerSecs = MODES[m];
  updateTimerDisplay();
}
function toggleTimer() {
  const ico = document.getElementById('timer-ico');
  if (timerRunning) {
    clearInterval(timerInt); timerRunning=false;
    if (ico) ico.innerHTML = '<polygon points="5 3 19 12 5 21 5 3"/>';
  } else {
    timerRunning=true;
    if (ico) ico.innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
    timerInt = setInterval(()=>{
      if (timerSecs<=0) {
        clearInterval(timerInt); timerRunning=false;
        timerSessions++;
        const sessEl = document.getElementById('timer-sessions');
        if (sessEl) sessEl.textContent=`Sesi ${timerSessions} / 4 selesai hari ini`;
        if (ico) ico.innerHTML='<polygon points="5 3 19 12 5 21 5 3"/>';
        showToast('Sesi selesai! Istirahat sebentar.');
        timerSecs = MODES.focus;
        updateTimerDisplay();
        return;
      }
      timerSecs--; updateTimerDisplay();
    },1000);
  }
}
function resetTimer() {
  clearInterval(timerInt); timerRunning=false;
  const tabs = document.querySelectorAll('#timer-widget .timer-tab');
  let idx=0; tabs.forEach((t,i)=>{if(t.classList.contains('on'))idx=i;});
  const keys = ['focus','short','long'];
  timerSecs = MODES[keys[idx]];
  updateTimerDisplay();
  const ico = document.getElementById('timer-ico');
  if (ico) ico.innerHTML='<polygon points="5 3 19 12 5 21 5 3"/>';
}
function updateTimerDisplay() {
  const m = Math.floor(timerSecs/60).toString().padStart(2,'0');
  const s = (timerSecs%60).toString().padStart(2,'0');
  const display = document.getElementById('timer-display');
  if (display) display.textContent=`${m}:${s}`;
}

  { q:'Dalam manajemen data, apa yang dimaksud dengan "data cleaning"?', opts:['Menghapus semua data','Proses memperbaiki data tidak akurat atau tidak lengkap','Mengenkripsi data','Membackup database'], ans:1, exp:'Data cleaning adalah proses mendeteksi dan memperbaiki data yang korup, tidak akurat, atau tidak lengkap dalam dataset.' },
  { q:'Apa perbedaan data kuantitatif dan kualitatif?', opts:['Tidak ada perbedaan','Kuantitatif berupa angka, kualitatif berupa kategori/deskripsi','Kualitatif lebih akurat','Kuantitatif hanya untuk survei'], ans:1, exp:'Data kuantitatif berupa angka yang bisa diukur (tinggi, berat), sedangkan data kualitatif berupa kategori atau deskripsi (warna, nama).' },
  { q:'Ukuran pemusatan data yang paling tidak dipengaruhi nilai ekstrem adalah?', opts:['Mean','Modus','Median','Range'], ans:2, exp:'Median adalah nilai tengah yang tidak terpengaruh oleh nilai ekstrem (outlier), berbeda dengan mean yang bisa bergeser drastis.' },
  { q:'Apa fungsi visualisasi data dalam analisis statistika?', opts:['Memperindah laporan saja','Memudahkan pemahaman pola dan tren data','Menggantikan perhitungan matematis','Memperbesar ukuran dataset'], ans:1, exp:'Visualisasi data membantu mengidentifikasi pola, tren, dan anomali dalam data secara intuitif yang sulit terlihat dari tabel angka.' },
];
let curQ=0, score=0, answered=false;
function buildQuiz() { renderQ(0); }

function renderQ(idx) {
  if (idx>=QS.length) { showResult(); return; }
  const q = QS[idx];
  const pct = Math.round(((idx+1)/QS.length)*100);
  const quizB = document.getElementById('quiz-badge');
  if (quizB) quizB.textContent=`Soal ${idx+1} / ${QS.length}`;
  const quizPf = document.getElementById('quiz-pf');
  if (quizPf) quizPf.style.width=pct+'%';
  answered=false;
  const letters=['A','B','C','D'];
  const quizA = document.getElementById('quiz-area');
  if (quizA) {
    quizA.innerHTML=`
      <div class="qcard">
        <div class="qnum">Soal ${idx+1} dari ${QS.length}</div>
        <div class="qtxt">${q.q}</div>
        <div class="qopts">
          ${q.opts.map((o,i)=>`
            <button class="qopt" onclick="pickOpt(${i})" id="o${i}">
              <span class="qopt-letter">${letters[i]}</span>${o}
            </button>`).join('')}
        </div>
        <div class="qexp" id="qexp">${q.exp}</div>
      </div>
      <div class="quiz-footer">
        <button class="btn-sec" onclick="showScreen('beranda')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          Kembali
        </button>
        <button class="btn-pri" id="btn-nxt" onclick="nextQ()" style="display:none">
          Lanjut
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
    `;

function getTime(){return new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});}

function addBubble(role,html){
  const p = JSON.parse(localStorage.getItem('nk_profile')||'{}');
  const nick = p.avatar || (p.nickname||'M')[0].toUpperCase();
  const isU=role==='user';
  const el=document.createElement('div');
  el.className='cmsg '+(isU?'u':'ai');
  const avaHtml=isU
    ?`<div class="cmsg-ava u">${nick}</div>`
    :`<div class="cmsg-ava ai"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4"/><path d="M12 16h.01"/></svg></div>`;
  el.innerHTML=`${avaHtml}<div class="cmsg-body"><div class="cmsg-bubble">${html}</div><div class="cmsg-time">${getTime()}</div></div>`;
  const msgs = document.getElementById('chat-msgs');
  if (msgs) {
    msgs.appendChild(el);
    msgs.scrollTop=99999;
  }
  return el;
}

function showTyping(){
  const el=document.createElement('div');
  el.className='cmsg ai';el.id='typing-el';
  el.innerHTML=`<div class="cmsg-ava ai"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4"/><path d="M12 16h.01"/></svg></div><div class="cmsg-body"><div class="cmsg-bubble"><div class="typing"><div class="td"></div><div class="td"></div><div class="td"></div></div></div></div>`;
  const msgs = document.getElementById('chat-msgs');
  if (msgs) {
    msgs.appendChild(el);
    msgs.scrollTop=99999;
  }
}

async function sendMsg(){
  const ta=document.getElementById('chat-ta');
  if (!ta) return;
  const txt=ta.value.trim();
  if(!txt||chatBusy)return;
  ta.value='';ta.style.height='auto';
  chatBusy=true;
  addBubble('user',txt);
  chatHist.push({role:'user',content:txt});
  showTyping();
  const p = JSON.parse(localStorage.getItem('nk_profile')||'{}');
  const nick = p.nickname || 'Muhammad';
  const school = p.school || 'belum diketahui';
  const goal = p.goal || 'belajar lebih baik';
  try{
    const res=await fetch(API,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:1000,
        system:`Kamu adalah Nala AI, asisten belajar cerdas di platform Nalarku.ai. Kamu membantu pengguna bernama ${nick} (dari ${school}, tujuan: ${goal}) belajar lebih efektif dengan menganalisis pola belajarnya.`,
        messages:chatHist
      })
    });
    const data=await res.json();
    const reply=(data.content?.[0]?.text||'Maaf, ada gangguan. Coba lagi!').replace(/\n/g,'<br>');
    const typingEl = document.getElementById('typing-el');
    if (typingEl) typingEl.remove();
    chatHist.push({role:'assistant',content:data.content?.[0]?.text||''});
    addBubble('ai',reply);
  }catch(e){
    const typingEl = document.getElementById('typing-el');
    if (typingEl) typingEl.remove();
    addBubble('ai','Koneksi terputus. Periksa internet kamu dan coba lagi.');
  }
  chatBusy=false;
}

function updateWordCount() {
  const ta = document.getElementById('plag-ta');
  if (ta) {
    const text = ta.value;
    const words = text.trim() ? text.trim().split(/\s+/).length : 0;
    const wc = document.getElementById('plag-wc');
    if (wc) wc.textContent = `${words} kata · ${text.length} karakter`;
  }
}

function clearPlagText() {
  const ta = document.getElementById('plag-ta');
  if (ta) ta.value = '';
  updateWordCount();
}

async function runPlagCheck() {
  const ta = document.getElementById('plag-ta');
  if (!ta) return;
  const text = ta.value.trim();
  if (!text || text.split(/\s+/).length < 10) {
    showToast('Masukkan minimal 10 kata untuk analisis!', true);
    return;
  }

  const form = document.getElementById('plag-form');
  if (form) form.style.display = 'none';
  const resultD = document.getElementById('plag-result');
  if (resultD) resultD.style.display = 'none';
  const loading = document.getElementById('plag-loading');
  if (loading) loading.style.display = 'flex';

  const steps = ['pls-1','pls-2','pls-3','pls-4'];
  let si = 0;
  const stepInt = setInterval(() => {
    if (si > 0) {
      const prevStep = document.getElementById(steps[si-1]);
      if (prevStep) prevStep.className = 'plag-load-step done-s';
    }
    if (si < steps.length) {
      const curStep = document.getElementById(steps[si]);
      if (curStep) curStep.className = 'plag-load-step active-s';
      si++;
    } else {
      clearInterval(stepInt);
    }
  }, 700);

  try {
    const res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        system: `Kamu adalah sistem pendeteksi plagiarisme AI bernama Nala AI. Balas HANYA dengan JSON.`,
        messages: [{ role: 'user', content: `Analisis plagiarisme teks berikut:\n\n"${text.substring(0, 2000)}"` }]
      })
    });
    const data = await res.json();
    clearInterval(stepInt);
    steps.forEach(s => {
      const stepEl = document.getElementById(s);
      if (stepEl) stepEl.className = 'plag-load-step done-s';
    });

    setTimeout(() => {
      let result;
      try {
        const raw = data.content?.[0]?.text || '{}';
        const clean = raw.replace(/```json|```/g, '').trim();
        result = JSON.parse(clean);
      } catch(e) {
        result = {
          similarity: Math.floor(Math.random()*30)+5,
          verdict: 'Mungkin Mirip',
          sources: [
            {name:'Internet & Web', pct: Math.floor(Math.random()*20)+3, color:'yellow'},
            {name:'Deteksi AI', pct: Math.floor(Math.random()*15)+2, color:'yellow'},
          ],
          recommendation: 'Coba parafrase ulang kalimat-kalimat yang terdeteksi mirip.'
        };
      }
      showPlagResult(result);
    }, 500);

  } catch(e) {
    clearInterval(stepInt);
    if (loading) loading.style.display = 'none';
    if (form) form.style.display = 'block';
    showToast('Koneksi error. Coba lagi!', true);
  }
}

function showPlagResult(r) {
  const loading = document.getElementById('plag-loading');
  if (loading) loading.style.display = 'none';
  const resultDiv = document.getElementById('plag-result');
  if (resultDiv) resultDiv.style.display = 'block';

  const pct = Math.min(100, Math.max(0, r.similarity || 0));
  const circumference = 339.3;
  const offset = circumference - (pct / 100) * circumference;
  const fill = document.getElementById('plag-ring-fill');

  if (fill) {
    let ringColor = '#22c55e';
    if (pct >= 30 && pct < 60) ringColor = '#eab308';
    if (pct >= 60) ringColor = '#ef4444';
    fill.style.stroke = ringColor;
    setTimeout(() => { fill.style.strokeDashoffset = offset; }, 100);
  }
  const pctTxt = document.getElementById('plag-pct-txt');
  if (pctTxt) pctTxt.textContent = pct + '%';

  const vEl = document.getElementById('plag-verdict');
  if (vEl) {
    vEl.textContent = r.verdict || (pct < 20 ? 'Orisinal' : pct < 50 ? 'Mungkin Mirip' : 'Terindikasi Plagiat');
    vEl.className = 'plag-verdict ' + (pct < 20 ? 'low' : pct < 50 ? 'med' : 'high');
  }

  const sources = r.sources || [];
  if (r.ai_detection !== undefined) sources.push({name:'Deteksi Teks AI', pct: r.ai_detection, color: r.ai_detection > 30 ? 'red' : 'yellow'});
  const colorMap = {green:'var(--green)', yellow:'var(--yellow)', red:'var(--red)'};
  const bdRows = document.getElementById('plag-bd-rows');
  if (bdRows) {
    bdRows.innerHTML = sources.map(s => `
      <div class="plag-bd-row">
        <div class="plag-bd-label">${s.name}</div>
        <div class="plag-bd-bar"><div class="plag-bd-fill" style="width:0%;background:${colorMap[s.color]||'var(--orange)'}" data-pct="${s.pct}"></div></div>
        <div class="plag-bd-pct" style="color:${colorMap[s.color]||'var(--orange)'}">${s.pct}%</div>
      </div>`).join('');
  }

  setTimeout(() => {
    document.querySelectorAll('.plag-bd-fill').forEach(el => {
      if (el) {
        el.style.transition = 'width 1s ease';
        el.style.width = el.dataset.pct + '%';
      }
    });
  }, 200);

  const hlSection = document.getElementById('plag-hl-section');
  const hl = r.highlights || [];
  if (hl.length > 0 && pct > 10) {
    if (hlSection) hlSection.style.display = 'block';
    const hlItems = document.getElementById('plag-hl-items');
    if (hlItems) {
      hlItems.innerHTML = hl.map(h => `
        <div class="plag-hl-item">
          <strong>"${h.text}"</strong>
          <div class="plag-hl-source">${h.source}</div>
        </div>`).join('');
    }
  } else {
    if (hlSection) hlSection.style.display = 'none';
  }

  const aiRec = document.getElementById('plag-ai-rec-txt');
  if (aiRec) aiRec.textContent = r.recommendation || 'Teksmu terlihat orisinal. Pertahankan gaya penulisanmu sendiri!';
}

function resetPlag() {
  const ta = document.getElementById('plag-ta');
  if (ta) ta.value = '';
  updateWordCount();
  const form = document.getElementById('plag-form');
  if (form) form.style.display = 'block';
  const loading = document.getElementById('plag-loading');
  if (loading) loading.style.display = 'none';
  const result = document.getElementById('plag-result');
  if (result) result.style.display = 'none';
  document.querySelectorAll('.plag-load-step').forEach((el,i) => {
    if (el) el.className = 'plag-load-step' + (i===0 ? ' active-s' : '');
  });
}
